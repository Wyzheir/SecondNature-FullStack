version: '3.8'
services:
  # Redis 内部容器化部署
  redis:
    image: redis:7-alpine
    container_name: secondnature_redis
    restart: always
    # 使用环境变量读取 Redis 密码，确保和 .env 同步
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis_data:/data
    networks:
      - app-net

  # 你的 FastAPI 后端
  fastapi_backend:
    build: .
    container_name: secondnature_backend
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
    networks:
      - app-net

networks:
  app-net:
    driver: bridge